name: discover_egypt
description: Discover Egypt - Your Ultimate Travel Guide
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  lottie: ^2.7.0

  # State & Navigation
  provider: ^6.1.1
  go_router: ^12.1.3

  # Network
  http: ^1.1.0
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # Permissions & Location
  geolocator: ^10.1.0
  permission_handler: ^11.1.0

  # Auth
  google_sign_in: ^6.2.1

  # Utils
  intl: 0.20.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  image_picker: ^1.0.5
  flutter_svg: ^2.0.9
  connectivity_plus: ^5.0.2
  timeago: ^3.6.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
dev_dependencies:
  flutter_lints: ^6.0.0
